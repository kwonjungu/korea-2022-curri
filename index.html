// DOM elements
const schoolLevelSelect = document.getElementById('schoolLevel');
const gradeGroupSelect = document.getElementById('gradeGroup');
const subjectSelect = document.getElementById('subject');
const resultSection = document.getElementById('resultSection');
const resultTitle = document.getElementById('resultTitle');
const resultBody = document.getElementById('resultBody');
const resultCount = document.getElementById('resultCount');

let currentStandards = [];
let currentMeta = {};

schoolLevelSelect.addEventListener('change', () => {
  const level = schoolLevelSelect.value;
  gradeGroupSelect.innerHTML = '<option value="">학년군 선택</option>';
  subjectSelect.innerHTML = '<option value="">과목 선택</option>';
  subjectSelect.disabled = true;
  resultSection.classList.add('hidden');

  if (!level) { gradeGroupSelect.disabled = true; return; }

  const groups = CURRICULUM_DATA[level].gradeGroups;
  Object.entries(groups).forEach(([key, val]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = val.name;
    gradeGroupSelect.appendChild(opt);
  });
  gradeGroupSelect.disabled = false;
});

gradeGroupSelect.addEventListener('change', () => {
  const level = schoolLevelSelect.value;
  const group = gradeGroupSelect.value;
  subjectSelect.innerHTML = '<option value="">과목 선택</option>';
  resultSection.classList.add('hidden');

  if (!group) { subjectSelect.disabled = true; return; }

  const subjects = CURRICULUM_DATA[level].gradeGroups[group].subjects;
  Object.entries(subjects).forEach(([key, val]) => {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = val.name;
    subjectSelect.appendChild(opt);
  });
  subjectSelect.disabled = false;
});

subjectSelect.addEventListener('change', () => {
  const level = schoolLevelSelect.value;
  const group = gradeGroupSelect.value;
  const subj = subjectSelect.value;

  if (!subj) { resultSection.classList.add('hidden'); return; }

  const data = CURRICULUM_DATA[level].gradeGroups[group].subjects[subj];
  currentStandards = data.standards;
  currentMeta = {
    schoolLevel: CURRICULUM_DATA[level].name,
    gradeGroup: CURRICULUM_DATA[level].gradeGroups[group].name,
    subject: data.name
  };

  resultTitle.textContent = `${currentMeta.schoolLevel} ${currentMeta.gradeGroup} ${currentMeta.subject} 성취기준`;

  resultBody.innerHTML = '';
  data.standards.forEach((s, i) => {
    const tr = document.createElement('tr');
    tr.className = i % 2 === 0 ? 'bg-white' : 'bg-gray-50';
    tr.innerHTML = `
      <td class="px-4 py-3 text-gray-500">${i + 1}</td>
      <td class="px-4 py-3 font-mono text-blue-700 font-medium whitespace-nowrap">${s.code}</td>
      <td class="px-4 py-3 text-gray-600 whitespace-nowrap">${s.area}</td>
      <td class="px-4 py-3 text-gray-800">${s.desc}</td>
    `;
    resultBody.appendChild(tr);
  });

  resultCount.textContent = `총 ${data.standards.length}개의 성취기준`;
  resultSection.classList.remove('hidden');
});

function downloadExcel() {
  const rows = [
    ['학교급', '학년군', '과목', '성취기준 코드', '영역', '성취기준'],
    ...currentStandards.map(s => [
      currentMeta.schoolLevel,
      currentMeta.gradeGroup,
      currentMeta.subject,
      s.code,
      s.area,
      s.desc
    ])
  ];

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    { wch: 10 }, { wch: 14 }, { wch: 10 }, { wch: 16 }, { wch: 16 }, { wch: 60 }
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '성취기준');

  const filename = `${currentMeta.schoolLevel}_${currentMeta.gradeGroup}_${currentMeta.subject}_성취기준.xlsx`;
  XLSX.writeFile(wb, filename);
}
</script>
