const schoolSelect = document.getElementById('schoolLevel');
const gradeSelect = document.getElementById('gradeGroup');
const resultSection = document.getElementById('resultSection');
const tableBody = document.getElementById('resultBody');
const resultTitle = document.getElementById('resultTitle');
const standardCount = document.getElementById('resultCount');

const SCHOOL_LABELS = {elementary:'초등학교',middle:'중학교'};
const GRADE_LABELS = {"1-2":"1~2학년군","3-4":"3~4학년군","5-6":"5~6학년군","1-3":"1~3학년군"};

function getSubjects(s,g){
  const gg=CURRICULUM_DATA[s].gradeGroups[g];
  return gg.subjects||gg;
}

function populateSchool(){
  schoolSelect.innerHTML='<option value="">학교급 선택</option>';
  Object.keys(CURRICULUM_DATA).forEach(k=>{
    const o=document.createElement('option');o.value=k;o.textContent=SCHOOL_LABELS[k];schoolSelect.appendChild(o);
  });
}

function populateGrade(){
  gradeSelect.innerHTML='<option value="">학년군 선택</option>';
  resetSubjects();
  resultSection.classList.add('hidden');
  const s=schoolSelect.value;if(!s){gradeSelect.disabled=true;return;}
  gradeSelect.disabled=false;
  const gs=CURRICULUM_DATA[s].gradeGroups;
  Object.keys(gs).forEach(k=>{
    const o=document.createElement('option');o.value=k;o.textContent=GRADE_LABELS[k]||k;gradeSelect.appendChild(o);
  });
}

function resetSubjects(){
  document.getElementById('subjectChecks').innerHTML='';
  document.getElementById('checkAll').checked=false;
  document.getElementById('subjectBtnText').textContent='과목 선택';
  document.getElementById('subjectBtnText').className='text-gray-400';
  document.getElementById('subjectBtn').disabled=true;
  document.getElementById('subjectPanel').classList.add('hidden');
}

function populateSubject(){
  resetSubjects();
  resultSection.classList.add('hidden');
  const s=schoolSelect.value,g=gradeSelect.value;
  if(!s||!g)return;
  document.getElementById('subjectBtn').disabled=false;
  const subs=getSubjects(s,g);
  const checks=document.getElementById('subjectChecks');
  Object.keys(subs).forEach(k=>{
    if(k==='name')return;
    const label=document.createElement('label');
    label.className='flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer text-sm';
    label.innerHTML='<input type="checkbox" value="'+k+'" onchange="onSubjectChange()" class="subject-check w-4 h-4 text-blue-600 rounded"><span class="ml-2">'+subs[k].name+'</span>';
    checks.appendChild(label);
  });
}

function toggleSubjects(){
  document.getElementById('subjectPanel').classList.toggle('hidden');
}

function toggleAllSubjects(el){
  document.querySelectorAll('.subject-check').forEach(cb=>{cb.checked=el.checked;});
  onSubjectChange();
}

function getSelectedSubjects(){
  return Array.from(document.querySelectorAll('.subject-check:checked')).map(cb=>cb.value);
}

function onSubjectChange(){
  const selected=getSelectedSubjects();
  const total=document.querySelectorAll('.subject-check').length;
  const btn=document.getElementById('subjectBtnText');
  const s=schoolSelect.value,g=gradeSelect.value;
  if(!s||!g)return;
  const subs=getSubjects(s,g);
  document.getElementById('checkAll').checked=selected.length===total&&total>0;
  if(selected.length===0){
    btn.textContent='과목 선택';btn.className='text-gray-400';
    resultSection.classList.add('hidden');
  }else{
    const names=selected.map(k=>subs[k].name);
    btn.textContent=names.length<=2?names.join(', '):names.length+'과목 선택됨';
    btn.className='text-gray-800';
    showStandards();
  }
}

function showStandards(){
  const s=schoolSelect.value,g=gradeSelect.value;
  const selected=getSelectedSubjects();
  if(!s||!g||selected.length===0){resultSection.classList.add('hidden');return;}
  const subs=getSubjects(s,g);
  let all=[];
  selected.forEach(k=>{
    const data=subs[k];
    data.standards.forEach(st=>{all.push({...st,subject:data.name});});
  });
  const names=selected.map(k=>subs[k].name);
  resultTitle.textContent=SCHOOL_LABELS[s]+' '+GRADE_LABELS[g]+' '+(names.length<=3?names.join(', '):names.length+'과목')+' 성취기준';
  standardCount.textContent='총 '+all.length+'개';
  tableBody.innerHTML='';
  all.forEach((st,i)=>{
    const tr=document.createElement('tr');
    tr.className=i%2===0?'bg-white':'bg-gray-50';
    tr.innerHTML='<td class="px-4 py-3 text-sm text-gray-500 text-center">'+(i+1)+'</td><td class="px-4 py-3 text-sm font-mono text-blue-700 whitespace-nowrap">'+st.code+'</td><td class="px-4 py-3 text-sm text-blue-600 whitespace-nowrap">'+st.subject+'</td><td class="px-4 py-3 text-sm text-gray-600 whitespace-nowrap">'+st.area+'</td><td class="px-4 py-3 text-sm text-gray-800">'+st.desc+'</td>';
    tableBody.appendChild(tr);
  });
  resultSection.classList.remove('hidden');
}

function downloadExcel(){
  const s=schoolSelect.value,g=gradeSelect.value;
  const selected=getSelectedSubjects();
  if(!s||!g||selected.length===0)return;
  const subs=getSubjects(s,g);
  const rows=[['과목','성취기준 코드','영역','성취기준']];
  selected.forEach(k=>{
    const data=subs[k];
    data.standards.forEach(st=>{rows.push([data.name,st.code,st.area,st.desc]);});
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:10},{wch:15},{wch:20},{wch:80}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'성취기준');
  const names=selected.map(k=>subs[k].name);
  const subLabel=names.length<=3?names.join('_'):names.length+'과목';
  XLSX.writeFile(wb,SCHOOL_LABELS[s]+'_'+GRADE_LABELS[g]+'_'+subLabel+'_성취기준.xlsx');
}

document.addEventListener('click',function(e){
  const c=document.getElementById('subjectContainer');
  if(c&&!c.contains(e.target))document.getElementById('subjectPanel').classList.add('hidden');
});

schoolSelect.addEventListener('change',()=>{populateGrade();});
gradeSelect.addEventListener('change',()=>{populateSubject();});

populateSchool();
</script>
